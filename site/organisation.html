<!DOCTYPE html>
<html lang="de">

<head>
    <script>
        (function () {
            try {
                var theme = localStorage.getItem('malerweg-theme');
                if (theme) document.documentElement.classList.add(theme);
            } catch (e) { }
        })();
    </script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title id="meta-title">Organisation & Anreise - Malerweg 2026</title>
    <meta id="meta-description" name="description"
        content="Wichtige Informationen zur Organisation, Anreise und dem Ablauf der Malerweg-Wanderung 2026." />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/tokens.css?v=202603101155" />
    <link rel="stylesheet" href="assets/css/base.css?v=202603101155" />
    <link rel="stylesheet" href="assets/css/layout.css?v=202603101155" />
    <link rel="stylesheet" href="assets/css/components.css?v=202603101155" />
    <link rel="stylesheet" href="assets/css/pages.css?v=202603101155" />
</head>

<body>
    <header class="site-header" id="main-header"></header>
    <main>
        <div class="page-header">
            <div class="container">
                <p class="page-header__eyebrow">Malerweg 2026</p>
                <h1 class="page-header__title">Organisation &amp; Anreise</h1>
                <p class="page-header__desc">Alle wichtigen Informationen rund um Deine Wanderung an einem Ort.</p>
            </div>
        </div>
        <section class="section">
            <div class="container">
                <!-- Flat structure handles mobile order (1..6) and desktop layout (Row by Row) -->
                <div class="two-col" style="row-gap: var(--space-12);">
                    <!-- 1. Teilnehmer -->
                    <div>
                        <div class="section-icon-header">
                            <span class="material-symbols-outlined">groups</span>
                            <h2>Teilnehmer</h2>
                        </div>
                        <div class="card">
                            <ul class="participant-list" id="participants-list-container">
                                <!-- JS populated participants -->
                            </ul>
                        </div>
                    </div>
                    <!-- 2. Anreise -->
                    <div>
                        <div class="section-icon-header">
                            <span class="material-symbols-outlined">location_on</span>
                            <h2>Anreise nach Liebethal</h2>
                        </div>
                        <div class="card" id="arrival-list-container">
                            <!-- JS populated arrival list -->
                        </div>
                    </div>
                    <!-- 3. Tagesplan -->
                    <div>
                        <div class="section-icon-header">
                            <span class="material-symbols-outlined">calendar_today</span>
                            <h2>Tagesplan</h2>
                        </div>
                        <div class="card" style="padding-top: var(--space-8); padding-bottom: var(--space-4);">
                            <div class="timeline" id="schedule-timeline">
                                <!-- JS populated timeline -->
                            </div>
                        </div>
                    </div>
                    <!-- 4. ÖPNV -->
                    <div>
                        <div class="section-icon-header">
                            <span class="material-symbols-outlined">tram</span>
                            <h2>ÖPNV auf der Route</h2>
                        </div>
                        <div class="card" id="local-transport-list-container">
                            <!-- JS populated local transport list -->
                        </div>
                    </div>
                    <!-- 5. Treffpunkte -->
                    <div>
                        <div class="section-icon-header">
                            <span class="material-symbols-outlined">map</span>
                            <h2>Treffpunkte</h2>
                        </div>
                        <div class="card">
                            <ul class="feature-list" id="meeting-points-list-container">
                                <!-- JS populated meeting points -->
                            </ul>
                        </div>
                    </div>
                    <!-- 6. Abreise -->
                    <div>
                        <div class="section-icon-header">
                            <span class="material-symbols-outlined">exit_to_app</span>
                            <h2>Abreise von Pirna</h2>
                        </div>
                        <div class="card" id="departure-list-container">
                            <!-- JS populated departure list -->
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <footer class="site-footer" id="main-footer"></footer>
    <script src="assets/js/data-provider.js?v=202603101155"></script>
    <script src="assets/js/nav.js?v=202603101155"></script>
    <script src="assets/js/app-organisation-loader.js?v=202603101155"></script>
</body>

</html>
