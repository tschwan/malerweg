<body>
    <header class="site-header" id="main-header"></header>
    <main>
        <div class="page-header">
            <div class="container">
                <p class="page-header__eyebrow">Malerweg 2026</p>
                <h1 class="page-header__title">Organisation</h1>
                <p class="page-header__desc">Tagesplan, Teilnehmerliste und wichtige Treffpunkte im Überblick.</p>
            </div>
        </div>
        <section class="section">
            <div class="container">
                <div class="two-col">
                    <!-- TAGEPLAN -->
                    <div>
                        <div class="section-icon-header">
                            <span class="material-symbols-outlined">calendar_today</span>
                            <h2>Tagesplan</h2>
                        </div>
                        <div class="timeline" id="schedule-timeline">
                            <!-- JS populated timeline -->
                        </div>
                    </div>
                    <!-- TEILNEHMER -->
                    <div>
                        <div class="section-icon-header">
                            <span class="material-symbols-outlined">groups</span>
                            <h2>Teilnehmer</h2>
                        </div>
                        <div class="card" style="margin-bottom:var(--space-6);">
                            <ul class="participant-list" id="participants-list-container">
                                <!-- JS populated participants -->
                            </ul>
                        </div>
                        <!-- TREFFPUNKTE -->
                        <div class="section-icon-header">
                            <span class="material-symbols-outlined">location_on</span>
                            <h2>Treffpunkte</h2>
                        </div>
                        <div class="card">
                            <ul class="feature-list" id="meeting-points-list-container">
                                <!-- JS populated meeting points -->
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
