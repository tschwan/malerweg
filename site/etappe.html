<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title id="meta-title">Etappe - Malerweg 2026</title>
    <meta id="meta-description" name="description" content="Malerweg Etappe" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="assets/css/tokens.css?v=202603091648" />
    <link rel="stylesheet" href="assets/css/base.css?v=202603091648" />
    <link rel="stylesheet" href="assets/css/layout.css?v=202603091648" />
    <link rel="stylesheet" href="assets/css/components.css?v=202603091648" />
    <link rel="stylesheet" href="assets/css/pages.css?v=202603091648" />
    <link rel="stylesheet" href="https://unpkg.com/@raruto/leaflet-elevation@2.5.1/dist/leaflet-elevation.min.css" />
</head>

<body>
    <header class="site-header" id="main-header"></header>
    <main>
        <div class="stage-hero" id="stage-hero">
            <div class="stage-hero__content">
                <div class="container">
                    <div class="breadcrumb">
                        <a href="index.html">Start</a>
                        <span class="breadcrumb__sep">›</span>
                        <span class="breadcrumb__sep">›</span>
                        <span class="breadcrumb__current" id="breadcrumb-current">-</span>
                    </div>
                    <h1 class="stage-hero__title" id="stage-title">-</h1>
                    <p style="color:rgba(255,255,255,0.80);font-size:var(--font-size-lg);" id="stage-date">-</p>
                </div>
            </div>
        </div>
        <section class="section">
            <div class="container">
                <div class="stage-stats">
                    <div class="stage-stat">
                        <p class="stage-stat__label">Distanz</p>
                        <p class="stage-stat__value" id="stat-distance">-</p>
                    </div>
                    <div class="stage-stat">
                        <p class="stage-stat__label">Höhenmeter</p>
                        <p class="stage-stat__value" id="stat-elevation">-</p>
                    </div>
                    <div class="stage-stat">
                        <p class="stage-stat__label">Gehzeit</p>
                        <p class="stage-stat__value" id="stat-duration">-</p>
                    </div>
                    <div class="stage-stat">
                        <p class="stage-stat__label">Schwierigkeit</p>
                        <p class="stage-stat__value" id="stat-difficulty">-</p>
                    </div>
                </div>
                <div class="stage-detail-grid">
                    <div>
                        <!-- KARTE -->
                        <h2 style="margin-bottom:var(--space-4);">Karte &amp; GPX-Track</h2>
                        <div class="map-container" id="stage-map" style="margin-bottom:var(--space-3);"></div>
                        <p id="stage-map-info"
                            style="font-size:var(--font-size-sm);color:var(--color-text-muted);margin-bottom:var(--space-4);">
                        </p>
                        <div id="elevation-div" style="margin-bottom:var(--space-4);"></div>
                        <a href="#" id="gpx-download-btn" class="btn btn--outline btn--sm" download>
                            <span class="material-symbols-outlined">download</span> <span id="gpx-download-text">GPX
                                herunterladen</span>
                        </a>
                        <!-- BESCHREIBUNG -->
                        <h2 style="margin-top:var(--space-10);margin-bottom:var(--space-4);">Beschreibung</h2>
                        <p id="stage-description">-</p>
                        <div id="infobox-container">
                            <!-- JS populated -->
                        </div>
                    </div>
                    <div>
                        <!-- HIGHLIGHTS -->
                        <div class="card" style="margin-bottom:var(--space-6);">
                            <div class="section-icon-header" style="margin-bottom:var(--space-4);">
                                <span class="material-symbols-outlined">star</span>
                                <h3 style="font-size:var(--font-size-xl);">Highlights</h3>
                            </div>
                            <ul class="feature-list" id="highlights-list">
                                <!-- JS populated -->
                            </ul>
                        </div>
                        <!-- EINKEHR -->
                        <div class="card" id="refreshments-card" style="margin-bottom:var(--space-6); display: none;">
                            <div class="section-icon-header" style="margin-bottom:var(--space-4);">
                                <span class="material-symbols-outlined">restaurant</span>
                                <h3 style="font-size:var(--font-size-xl);">Einkehr</h3>
                            </div>
                            <ul class="feature-list" id="refreshments-list">
                                <!-- JS populated -->
                            </ul>
                        </div>
                        <!-- UNTERKUNFT -->
                        <div id="accommodation-container">
                            <!-- JS populated -->
                        </div>
                    </div>
                </div>
                <!-- STAGE NAV -->
                <div class="stage-nav">
                    <a href="#" class="stage-nav__link" id="nav-prev" style="display: none; visibility: hidden;">
                        <span class="material-symbols-outlined">arrow_back</span>
                        <div>
                            <p class="stage-nav__meta">Vorherige Etappe</p>
                            <p class="stage-nav__name" id="nav-prev-name">-</p>
                        </div>
                    </a>
                    <a href="#" class="stage-nav__link stage-nav__link--next" id="nav-next"
                        style="display: none; visibility: hidden;">
                        <div>
                            <p class="stage-nav__meta" id="nav-next-meta">Nächste Etappe</p>
                            <p class="stage-nav__name" id="nav-next-name">-</p>
                        </div>
                        <span class="material-symbols-outlined">arrow_forward</span>
                    </a>
                </div>
            </div>
        </section>
    </main>
    <footer class="site-footer" id="main-footer"></footer>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>
    <script src="https://unpkg.com/@raruto/leaflet-elevation@2.5.1/dist/leaflet-elevation.min.js"></script>
    <script src="assets/js/data-provider.js?v=202603091648"></script>
    <script src="assets/js/nav.js?v=202603091648"></script>
    <script src="assets/js/components/accommodation-card.js?v=202603091648"></script>
    <script src="assets/js/app-data-loader.js?v=202603091648"></script>
    <script src="assets/js/app-etappe-loader.js?v=202603091648"></script>
</body>

</html>
